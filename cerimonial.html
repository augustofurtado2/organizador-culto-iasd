<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cerimonial — IASD Boa Vista</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f0f6fb; color: #001833; min-height: 100vh; padding-bottom: 80px; }

    header { background: linear-gradient(135deg, #003366, #0056a0); padding: 16px 20px 14px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 16px rgba(0,51,102,.25); }
    .header-icon { font-size: 22px; }
    header h1 { font-size: 16px; font-weight: 800; color: white; }
    header p  { font-size: 11px; color: #bfdbfe; font-weight: 500; }
    .badge-cer { margin-left: auto; background: rgba(255,255,255,.2); color: white; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,.3); }

    .info-strip { background: white; padding: 10px 20px; display: flex; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid #e5e7eb; }
    .info-pill { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; }
    .info-pill strong { color: #003366; font-weight: 600; }

    .status-bar { background: #fafafa; padding: 8px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e5e7eb; font-size: 11px; color: #9ca3af; }
    .status-bar.ok   { color: #16a34a; }
    .status-bar.err  { color: #ef4444; }
    .status-bar.load { color: #d97706; }
    .btn-refresh { background: #eff6ff; border: 1px solid #bfdbfe; color: #003366; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; }

    .progress-bar { background: white; padding: 10px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 10px; }
    .prog-track { flex: 1; height: 6px; background: #e5e7eb; border-radius: 6px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, #003366, #22c55e); border-radius: 6px; transition: width .5s; }
    .prog-label { font-size: 12px; font-weight: 700; color: #6b7280; white-space: nowrap; }

    .container { padding: 16px 16px 0; }
    .section-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #9ca3af; text-transform: uppercase; padding: 4px 0 8px; }
    .timeline { display: flex; flex-direction: column; }

    .moment-row { display: flex; align-items: stretch; gap: 0; cursor: pointer; user-select: none; }
    .timeline-track { display: flex; flex-direction: column; align-items: center; width: 36px; flex-shrink: 0; padding: 0 0 0 10px; }
    .tl-dot { width: 14px; height: 14px; border-radius: 50%; background: #d1d5db; border: 2px solid #e5e7eb; flex-shrink: 0; margin-top: 15px; transition: all .2s; }
    .tl-line { width: 2px; flex: 1; background: #e5e7eb; min-height: 12px; }
    .moment-row:last-child .tl-line { display: none; }
    .moment-row.checked .tl-dot  { background: #22c55e; border-color: #22c55e; }
    .moment-row.checked .tl-line { background: #d1fae5; }

    .moment-card { flex: 1; background: white; border-radius: 14px; margin: 4px 0; padding: 12px 14px; border: 1.5px solid #f3f4f6; box-shadow: 0 1px 6px rgba(0,51,102,.05); transition: all .2s; display: flex; align-items: center; gap: 10px; }
    .moment-row:active .moment-card { transform: scale(.98); }
    .moment-row.checked .moment-card { background: #f0fdf4; border-color: #bbf7d0; box-shadow: none; }

    .time-tag { font-size: 12px; font-weight: 700; color: #003366; background: #eff6ff; padding: 4px 10px; border-radius: 8px; min-width: 52px; text-align: center; flex-shrink: 0; }
    .moment-row.checked .time-tag { background: #d1fae5; color: #166534; }

    .moment-info { flex: 1; min-width: 0; }
    .moment-label { font-size: 13px; font-weight: 700; color: #001833; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .moment-row.checked .moment-label { color: #166534; text-decoration: line-through; }

    .moment-sub { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
    .resp-chip  { font-size: 11px; font-weight: 600; color: #6b7280; background: #f3f4f6; padding: 2px 8px; border-radius: 6px; }
    .music-chip { font-size: 11px; font-weight: 600; color: #003366; background: #dbeafe; padding: 2px 8px; border-radius: 6px; }
    .note-chip  { font-size: 11px; color: #92400e; background: #fef3c7; padding: 2px 8px; border-radius: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

    .check-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; color: #d1d5db; transition: all .2s; }
    .moment-row.checked .check-icon { color: #22c55e; }

    /* Setup overlay */
    .setup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
    .setup-overlay.open { display: flex; }
    .setup-box { background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,51,102,.25); }
    .setup-box h2 { font-size: 17px; font-weight: 800; color: #003366; margin-bottom: 6px; }
    .setup-box p  { font-size: 13px; color: #6b7280; margin-bottom: 20px; line-height: 1.5; }
    .setup-box input { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 14px; color: #001833; font-family: inherit; margin-bottom: 12px; background: #fafafa; }
    .setup-box input:focus { outline: none; border-color: #003f8c; background: white; }
    .btn-setup { width: 100%; background: linear-gradient(135deg, #003366, #0056a0); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }

    .btn-config { position: fixed; bottom: 20px; right: 20px; background: white; border: 1.5px solid #d1d5db; color: #6b7280; font-size: 20px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .empty-state { text-align: center; padding: 40px 20px; color: #9ca3af; }
    .empty-state p { font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>

<header>
  <span class="header-icon">🎙️</span>
  <div><h1>Cerimonial</h1><p>IASD Boa Vista</p></div>
  <span class="badge-cer">PROGRAMA</span>
</header>

<div class="info-strip">
  <span class="info-pill">📅 <strong id="info-data">—</strong></span>
  <span class="info-pill">👤 <strong id="info-anciao">—</strong></span>
  <span class="info-pill">🎙️ <strong id="info-cer">—</strong></span>
</div>

<div class="progress-bar" id="progress-bar" style="display:none">
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <span class="prog-label" id="prog-label">0 / 0</span>
</div>

<div class="status-bar" id="status-bar">
  <span id="status-text">Carregando...</span>
  <button class="btn-refresh" onclick="fetchData()">↻ Atualizar</button>
</div>

<div class="container">
  <div class="timeline" id="timeline">
    <div class="empty-state"><div style="font-size:40px;">📋</div><p>Aguardando dados...</p></div>
  </div>
</div>

<div class="setup-overlay" id="setup-overlay">
  <div class="setup-box">
    <h2>Configurar</h2>
    <p>Digite o <strong>Bin ID</strong> fornecido pelo responsável do app (disponível no botão ☁️ do organizador).</p>
    <input type="text" id="bid-input" placeholder="Ex: 6643a1b2c3d4e5f6...">
    <button class="btn-setup" onclick="saveSetup()">Conectar</button>
  </div>
</div>

<button class="btn-config" onclick="openSetup()" title="Configurar">⚙️</button>

<script>
  const JB = 'https://api.jsonbin.io/v3';
  let binId = new URLSearchParams(location.search).get('bid') || localStorage.getItem('cer-bid') || '';
  let checkedIds = JSON.parse(localStorage.getItem('cer-checked') || '[]');
  let refreshTimer;
  let lastData = null;

  function formatDate(s) { if (!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }

  function setStatus(msg, cls='') {
    document.getElementById('status-bar').className = 'status-bar ' + cls;
    document.getElementById('status-text').textContent = msg;
  }

  async function fetchData() {
    if (!binId) { openSetup(); return; }
    setStatus('Atualizando...', 'load');
    try {
      const res = await fetch(`${JB}/b/${binId}/latest`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const { record: data } = await res.json();
      lastData = data;
      render(data);
      const dt = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '—';
      setStatus(`Atualizado às ${dt} · próximo em 30s`, 'ok');
    } catch (e) {
      setStatus('Erro: ' + e.message, 'err');
    }
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(fetchData, 30000);
  }

  function render(data) {
    document.getElementById('info-data').textContent   = formatDate(data.data);
    document.getElementById('info-anciao').textContent = data.anciao || '—';
    document.getElementById('info-cer').textContent    = data.liderCerimonial || '—';

    const allItems = [
      ...(data.cultoItems||[]).filter(i=>i.enabled).map(i=>({...i,_sec:'culto'})),
      ...(data.ssItems||[]).filter(i=>i.enabled).map(i=>({...i,_sec:'ss'})),
    ];

    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '';

    if (!allItems.length) {
      timeline.innerHTML = `<div class="empty-state"><div style="font-size:40px;">📭</div><p>Nenhum momento configurado.</p></div>`;
      document.getElementById('progress-bar').style.display = 'none';
      return;
    }

    const done = allItems.filter(i=>checkedIds.includes(ikey(i))).length;
    document.getElementById('progress-bar').style.display = 'flex';
    document.getElementById('prog-fill').style.width = (done/allItems.length*100)+'%';
    document.getElementById('prog-label').textContent = `${done} / ${allItems.length}`;

    let lastSec = null;
    allItems.forEach((item, idx) => {
      if (item._sec !== lastSec) {
        const t = document.createElement('div');
        t.className = 'section-title';
        if (lastSec) t.style.paddingTop = '12px';
        t.textContent = item._sec==='culto' ? 'Culto' : 'Escola Sabatina';
        timeline.appendChild(t);
        lastSec = item._sec;
      }
      const key = ikey(item);
      const isChecked = checkedIds.includes(key);
      const songs = (item.songs||[]).filter(s=>s&&s.trim());

      let subHtml = '';
      if (item.resp) subHtml += `<span class="resp-chip">${esc(item.resp)}</span>`;
      if (item.hasSongs && songs.length) subHtml += `<span class="music-chip">🎵 ${songs.length} música${songs.length>1?'s':''}</span>`;
      if (item.note && !item.hasSongs) subHtml += `<span class="note-chip">💡 ${esc(item.note)}</span>`;

      const row = document.createElement('div');
      row.className = 'moment-row' + (isChecked?' checked':'');
      row.dataset.key = key;
      row.innerHTML = `
        <div class="timeline-track"><div class="tl-dot"></div><div class="tl-line"></div></div>
        <div class="moment-card">
          ${item.time?`<span class="time-tag">${esc(item.time)}</span>`:''}
          <div class="moment-info">
            <div class="moment-label">${esc(item.label)}</div>
            ${subHtml?`<div class="moment-sub">${subHtml}</div>`:''}
          </div>
          <span class="check-icon">${isChecked?'✅':'○'}</span>
        </div>`;
      row.addEventListener('click', () => toggleCheck(row, key, allItems));
      timeline.appendChild(row);
    });
  }

  function ikey(item) { return `${item._sec}-${item.label}-${item.time}`; }

  function toggleCheck(row, key, allItems) {
    const idx = checkedIds.indexOf(key);
    if (idx >= 0) checkedIds.splice(idx, 1); else checkedIds.push(key);
    localStorage.setItem('cer-checked', JSON.stringify(checkedIds));
    row.classList.toggle('checked');
    row.querySelector('.check-icon').textContent = row.classList.contains('checked') ? '✅' : '○';
    const done = checkedIds.length;
    document.getElementById('prog-fill').style.width = (done/allItems.length*100)+'%';
    document.getElementById('prog-label').textContent = `${done} / ${allItems.length}`;
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function openSetup() {
    document.getElementById('bid-input').value = binId;
    document.getElementById('setup-overlay').classList.add('open');
  }

  function saveSetup() {
    const val = document.getElementById('bid-input').value.trim();
    if (!val) return;
    binId = val;
    localStorage.setItem('cer-bid', val);
    document.getElementById('setup-overlay').classList.remove('open');
    fetchData();
  }

  if (binId) { localStorage.setItem('cer-bid', binId); fetchData(); }
  else openSetup();
</script>
</body>
</html>
